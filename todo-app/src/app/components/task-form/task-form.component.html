<form #form="ngForm" (ngSubmit)="onSubmit(form)">
    <input
      type="text"
      name="title"
      [(ngModel)]="task.title"
      placeholder="Title"
      required
    />
    <input
      type="text"
      name="description"
      [(ngModel)]="task.description"
      placeholder="Description"
    />
    <button type="submit">Add Task</button>
  </form>
